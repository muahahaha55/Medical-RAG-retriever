# Khởi chạy toàn hệ thống: docker compose -f docker/docker-compose.yml up --build
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data        # mount data/index, data/models đã build sẵn

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend
